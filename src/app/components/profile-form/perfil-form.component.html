<div class="card form-card shadow-lg border-0">
  <div class="card-body p-4">
    <h4 class="card-title fw-bold mb-3 titulo-degradado">
      <i class="bi bi-person-badge-fill"></i> Tu perfil en el foro
    </h4>

    <form [formGroup]="formGroup" (ngSubmit)="guardar()" novalidate>
      <div class="mb-3">
        <label for="nombre" class="form-label fw-semibold">Nombre</label>
        <input
          id="nombre"
          type="text"
          class="form-control input-glow"
          placeholder="Ej: Snake"
          formControlName="nombre">

        <div class="text-danger small mt-1" *ngIf="hasError('nombre', 'required')">
          <i class="bi bi-exclamation-circle"></i> El nombre es obligatorio.
        </div>
        <div class="text-danger small mt-1" *ngIf="hasError('nombre', 'nombrePropio')">
          <i class="bi bi-exclamation-circle"></i>
          El nombre no debe contener números y debe tener al menos {{ longitudMinimaNombre }} caracteres.
        </div>
      </div>

      <div class="mb-3">
        <label for="bio" class="form-label fw-semibold">Cuéntanos sobre ti</label>
        <textarea
          id="bio"
          class="form-control input-glow"
          rows="3"
          placeholder="Ej: Estudiante de UNITEC, fan del anime y la música retro..."
          formControlName="bio"></textarea>

        <div class="text-danger small mt-1" *ngIf="hasError('bio', 'required')">
          <i class="bi bi-exclamation-circle"></i> Cuéntanos algo sobre ti.
        </div>
        <div class="text-danger small mt-1" *ngIf="hasError('bio', 'maxlength')">
          <i class="bi bi-exclamation-circle"></i> Máximo 160 caracteres.
        </div>
      </div>

      <div class="d-flex justify-content-end">
        <button type="submit" class="btn btn-degradado px-4">
          <i class="bi bi-check-circle-fill"></i> Guardar perfil
        </button>
      </div>

      <div class="alert alert-exito mt-3 mb-0" *ngIf="guardadoExitoso">
        <i class="bi bi-emoji-smile-fill"></i> ¡Perfil guardado correctamente!
      </div>
    </form>
  </div>
</div>
